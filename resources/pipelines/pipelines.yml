resources:
  pipelines:
    bronze_raw_ingestion_pipeline:
      name: bronze_raw_ingestion_pipeline-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      serverless: true
      continuous: false
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
        volume: ${var.volume}

      libraries:
        - file:
            path: ../../src/transformation/bronze_raw_ingestion_pipeline.py