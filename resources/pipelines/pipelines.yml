resources:
  pipelines:
    bronze_raw_reference_ingestion_pipeline:
      name: bronze_raw_reference_ingestion_pipeline-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      serverless: true
      continuous: false
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
        volume: ${var.volume}
      libraries:
        - file:
            path: ../../src/transformation/bronze_reference_pipeline.py

    bronze_raw_operational_ingestion_pipeline:
      name: bronze_raw_operational_ingestion_pipeline-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      serverless: true
      continuous: false
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
        volume: ${var.volume}
      libraries:
        - file:
            path: ../../src/transformation/bronze_operational_pipeline.py
          