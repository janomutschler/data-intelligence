resources:
  pipelines:
    bronze_raw_reference_ingestion_pipeline:
      name: bronze_raw_reference_ingestion_pipeline-${bundle.target}
      catalog: ${var.catalog}
      schema: default
      serverless: true
      continuous: false
      root_path: "../../src/transformation"
      configuration:
        catalog: ${var.catalog}
      libraries:
        - file:
            path: ../../src/transformation/bronze/bronze_reference_pipeline.py
        - file:
            path: ../../src/transformation/silver/reference/countries.py
        - file:
            path: ../../src/transformation/silver/reference/aircraft.py
        - file:
            path: ../../src/transformation/silver/reference/airlines.py
        - file:
            path: ../../src/transformation/silver/reference/airports.py
        - file:
            path: ../../src/transformation/silver/reference/cities.py

    bronze_raw_operational_ingestion_pipeline:
      name: bronze_raw_operational_ingestion_pipeline-${bundle.target}
      catalog: ${var.catalog}
      schema: default
      serverless: true
      continuous: false
      root_path: "../../src/transformation"
      configuration:
        catalog: ${var.catalog}
      libraries:
        - file:
            path: ../../src/transformation/bronze/bronze_operational_pipeline.py
        - file:
            path: ../../src/transformation/silver/operational/flight_status.py
        - file:
            path: ../../src/transformation/gold/departure_airport_hourly.py
          