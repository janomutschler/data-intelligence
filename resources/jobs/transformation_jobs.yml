resources:
  jobs: 
    run_reference_silver_pipeline_py:
      name: run_reference_silver_pipeline
      email_notifications:
        on_failure:
          - jmutschl42@gmail.com
      notification_settings:
        no_alert_for_skipped_runs: true
      schedule:
        quartz_cron_expression: 20 15 22 19 * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: run_reference_silver_pipelinepy
          spark_python_task:
            python_file: ../../src/transformation/run_reference_silver_pipeline.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: Default
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED