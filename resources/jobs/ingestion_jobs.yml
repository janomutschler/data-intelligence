resources:
  jobs:
    run_flight_status_entrypoint_py:
      name: run_flight_status_ingestion
      email_notifications:
        on_failure:
          - jmutschl42@gmail.com
      notification_settings:
        no_alert_for_skipped_runs: true
      schedule:
        quartz_cron_expression: 45 5 0/4 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: run_flight_status_entrypointpy
          spark_python_task:
            python_file: ../../src/ingestion/run_flight_status_entrypoint.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --volume
              - ${var.volume}
          environment_key: Default
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED

