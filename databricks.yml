bundle:
  name: lh-data-platform

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

sync:
  include:
    - src

variables:
  catalog:
    default: "workspace"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-1189a44d-7664.cloud.databricks.com/
    variables:
      catalog: "data_intelligence_dev"

  prod:
    mode: production
    presets:
      name_prefix: 'production_'
      tags:
          prod: prod
    workspace:
      host: https://dbc-1189a44d-7664.cloud.databricks.com/
      root_path: /Workspace/Users/jmutschl42@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "data_intelligence_prod"